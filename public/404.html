<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Pakshal Agencies</title>
    <script>
      // Single Page App fallback routing for GitHub Pages
      var path = window.location.pathname;
      // Automatically detect base path (e.g., /PAKSHAL-AGENCYS or root /)
      var base = window.location.pathname.startsWith('/PAKSHAL-AGENCYS') ? '/PAKSHAL-AGENCYS' : '';
      var cleanPath = base ? path.slice(base.length) : path;
      var pageName = cleanPath.replace(/^\//, '');
      var validPages = ['about', 'gallery', 'products', 'contact', 'admin', 'login'];

      if (validPages.indexOf(pageName) !== -1) {
        var search = window.location.search;
        var separator = search ? '&' : '?';
        window.location.replace(window.location.origin + base + '/' + search + separator + 'page=' + pageName + window.location.hash);
      } else {
        window.location.replace(window.location.origin + base + '/' + window.location.search + window.location.hash);
      }
    </script>
  </head>
  <body>
  </body>
</html>
